version: "3.8"

services:
  # The Redis Database Service
  redis:
    image: redis:latest
    container_name: redis_db
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data  # Persists your data even if the container restarts

  # The FastAPI Application Service
  web:
    build: .
    container_name: fastapi_app
    ports:
      - "8000:8000"
    environment:
      # Pydantic Settings will automatically read these variables
      # We change the host from 'localhost' to the name of the redis service ('redis')
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
    depends_on:
      - redis

# Define the persistent volume
volumes:
  redis_data: